<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioPulse - Class Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Embla Carousel CDN -->
    <script src="https://unpkg.com/embla-carousel@8.1.3/embla-carousel.umd.js"></script>
    
    <!-- Link to your external stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">

    <!-- Auth Page -->
    <div id="authPage" class="w-full max-w-sm mx-auto text-center">
        <h1 class="text-4xl font-extrabold text-slate-800 mb-2">Welcome to</h1>
        <h2 class="text-5xl font-extrabold mb-10">
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-fuchsia-600">StudioPulse</span>
        </h2>
        <div class="card p-8 space-y-4">
            <h3 class="text-xl font-bold text-slate-700">Login</h3>
            <button id="openLoginModalBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition">Login to Your Account</button>
        </div>
    </div>

    <!-- Main App Wrapper -->
    <div id="appWrapper" class="w-full max-w-screen-2xl mx-auto hidden">
        <header class="w-full mb-8">
            <div class="flex flex-wrap justify-between items-center gap-4">
                 <h1 class="text-3xl lg:text-4xl font-extrabold text-slate-800 tracking-tighter">
                    <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-fuchsia-600">StudioPulse</span>
                </h1>
                <nav id="mainNav" class="flex items-center gap-2 sm:gap-6 bg-white/60 backdrop-blur-sm rounded-full px-4 py-2 border border-slate-200 shadow-sm">
                    <button data-page="schedule" class="nav-btn active font-semibold px-3 py-1 text-sm sm:text-base">Schedule</button>
                    <button data-page="statistics" class="nav-btn font-semibold px-3 py-1 text-sm sm:text-base">Statistics</button>
                    <button data-page="salary" class="nav-btn font-semibold px-3 py-1 text-sm sm:text-base">Salary</button>
                    <button data-page="members" class="nav-btn font-semibold px-3 py-1 text-sm sm:text-base">Members</button>
                    <button data-page="admin" class="nav-btn font-semibold px-3 py-1 text-sm sm:text-base">Admin</button>
                    <button data-page="courses" class="nav-btn font-semibold px-3 py-1 text-sm sm:text-base">Courses</button>
                    <button id="logoutBtn" class="font-semibold px-3 py-1 text-sm sm:text-base text-red-600 hover:text-red-800">Logout</button>
                </nav>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="app-content" class="w-full">
            <!-- Schedule Page -->
            <div id="page-schedule" class="page w-full"></div>
            <!-- Account Page (for Members) -->
            <div id="page-account" class="page hidden w-full max-w-screen-xl mx-auto"></div>
            <!-- Other Pages (Statistics, Salary, Members, Admin) -->
            <div id="page-statistics" class="page hidden w-full max-w-screen-xl mx-auto"></div>
            <div id="page-salary" class="page hidden w-full max-w-screen-xl mx-auto"></div>
            <div id="page-members" class="page hidden w-full max-w-screen-xl mx-auto"></div>
            <div id="page-admin" class="page hidden w-full max-w-screen-lg mx-auto"></div>
            <!-- Courses Page (New) -->
            <div id="page-courses" class="page hidden w-full max-w-screen-xl mx-auto"></div>
        </main>
    </div>

    <!-- Modals Container -->
    <div id="messageBox" class="fixed bottom-6 right-6 bg-green-500 text-white px-6 py-3 rounded-lg shadow-xl hidden z-50"></div>
    <div id="loginModal" class="fixed inset-0 flex items-center justify-center z-40 hidden p-4 modal-backdrop"></div>
    <div id="courseModal" class="fixed inset-0 flex items-center justify-center z-40 hidden p-4 modal-backdrop"></div>
    <div id="bookingModal" class="fixed inset-0 flex items-center justify-center z-40 hidden p-4 modal-backdrop"></div>
    <div id="joinedMembersModal" class="fixed inset-0 flex items-center justify-center z-40 hidden p-4 modal-backdrop"></div>
    <div id="sportTypeModal" class="fixed inset-0 flex items-center justify-center z-40 hidden p-4 modal-backdrop"></div>
    <div id="tutorModal" class="fixed inset-0 flex items-center justify-center z-40 hidden p-4 modal-backdrop"></div>
    <div id="memberModal" class="fixed inset-0 flex items-center justify-center z-40 hidden p-4 modal-backdrop"></div>
    <div id="editMemberAccountModal" class="fixed inset-0 flex items-center justify-center z-40 hidden p-4 modal-backdrop"></div>
    <div id="changePasswordModal" class="fixed inset-0 flex items-center justify-center z-40 hidden p-4 modal-backdrop"></div>
    <div id="confirmationModal" class="fixed inset-0 flex items-center justify-center z-50 hidden p-4 modal-backdrop"></div>
    <div id="memberBookingHistoryModal" class="fixed inset-0 flex items-center justify-center z-40 hidden p-4 modal-backdrop"></div>
    <div id="deleteCourseNotifyModal" class="fixed inset-0 flex items-center justify-center z-50 hidden p-4 modal-backdrop"></div>

    <!-- Cancel Copy Button -->
    <button id="cancelCopyBtn" class="hidden bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-full shadow-lg transition-transform hover:scale-105">Cancel Copy</button>

    <!-- Link to your external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
