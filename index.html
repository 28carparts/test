            document.body.appendChild(overlay); 
            const deleteButton = modal.querySelector('.delete-button'); 
            const cancelButton = modal.querySelector('.cancel-button'); 
            deleteButton.addEventListener('click', () => { onDeleteConfirm(); overlay.remove(); showNotification(`${itemType} deleted successfully!`); }); 
            cancelButton.addEventListener('click', () => overlay.remove()); 
        }
        async function copyToClipboard(text, sourceElement) { 
            if (sourceElement.dataset.isEditing === 'true') { 
                showNotification('Cannot copy while editing.', 'info');
                return;
            }

            try {
                if (navigator.clipboard && window.isSecureContext) { 
                    await navigator.clipboard.writeText(text);
                    showNotification('Sticker content copied! 📋');
                } else { 
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    try {
                        document.execCommand('copy');
                        showNotification('Sticker content copied! 📋');
                    } finally {
                        document.body.removeChild(textarea);
                    }
                }
            } catch (err) {
                console.error('Failed to copy:', err);
                debugMessage.textContent = 'Copy failed. Ensure page is HTTPS or try another browser.';
                debugMessage.classList.remove('hidden');
                setTimeout(() => { debugMessage.classList.add('hidden'); }, 3000);
            }
        }

        function showStickerDetailsModal(stickerData, stickerIndex) { 
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay fixed inset-0 flex items-center justify-center z-[100]';
            const modal = document.createElement('div');
            modal.className = 'modal-content sticker-details-modal-content fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 rounded-3xl p-6 sm:p-8 shadow-2xl';
            
            const date = new Date(stickerData.timestamp);
            const formattedDate = `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
            const formattedTime = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
            const displayTimestamp = `${formattedDate} ${formattedTime}`;

            const originalContent = stickerData.content; 

            const nameParts = stickerData.name.split(' - ', 2);
            const baseName = nameParts[0] || stickerData.name;
            const dateAndWeekPart = nameParts[1] ? `<br>${nameParts[1]}` : '';

            modal.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-3xl font-semibold text-gray-800">${baseName}${dateAndWeekPart}</h3>
                        <button id="closeDetailsModalButton" class="text-gray-500 hover:text-gray-700">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
                        </button>
                    </div>
                    <div class="mb-4 flex items-center gap-4">
                        <div class="modal-importance-display">
                            <div class="importance-light ${getImportanceLightClass(stickerData.importance)}"></div>
                            <span>Importance: ${getImportanceLabel(stickerData.importance)}</span>
                        </div>
                        <input type="text" id="detailsSearchInput" class="input-field flex-1 p-2 rounded-xl focus:outline-none text-sm" placeholder="Search within sticker content...">
                    </div>
                    <div class="mb-6">
                        <label for="stickerDetailsContent" class="block text-sm font-medium text-gray-700 mb-1">Content:</label>
                        <div id="stickerDetailsContent" class="sticker-details-content-area text-base text-gray-700 p-3 rounded-xl bg-gray-50 border border-gray-200 ${getImportanceBorderClass(stickerData.importance)}">
                            </div>
                    </div>
                    <p class="text-xs text-gray-500 text-right">${displayTimestamp}</p>
                    <div class="flex flex-col sm:flex-row gap-3 mt-6">
                        <button id="detailsModalCopyButton" class="copy-button action-button flex-1 text-white px-4 py-3 rounded-xl font-medium">Copy</button>
                        <button id="detailsModalEditButton" class="edit-button action-button flex-1 text-white px-4 py-3 rounded-xl font-medium">Edit</button>
                        <button id="detailsModalDeleteButton" class="delete-button action-button flex-1 text-white px-4 py-3 rounded-xl font-medium">Delete</button>
                    </div>
                </div>
            `;
            overlay.appendChild(modal);
            document.body.appendChild(overlay);
            
            const detailsContentDiv = modal.querySelector('#stickerDetailsContent');
            const detailsSearchInput = modal.querySelector('#detailsSearchInput');

            const renderContentWithHighlight = (content, searchTerm) => {
                if (!searchTerm) {
                    detailsContentDiv.textContent = content;
                    return;
                }
                const lowerCaseSearchTerm = searchTerm.toLowerCase();
                const regex = new RegExp(`(${lowerCaseSearchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                detailsContentDiv.innerHTML = content.replace(regex, '<mark class="bg-yellow-200 rounded">$1</mark>');

                const firstHighlight = detailsContentDiv.querySelector('mark');
                if (firstHighlight) {
                    firstHighlight.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            };

            renderContentWithHighlight(originalContent, '');

            detailsSearchInput.addEventListener('input', (e) => {
                renderContentWithHighlight(originalContent, e.target.value);
            });
            detailsSearchInput.focus(); 

            document.body.style.overflow = 'hidden'; 

            const closeBtn = modal.querySelector('#closeDetailsModalButton');
            const copyBtn = modal.querySelector('#detailsModalCopyButton');
            const editBtn = modal.querySelector('#detailsModalEditButton');
            const deleteBtn = modal.querySelector('#detailsModalDeleteButton');

            const closeModal = () => {
                document.body.style.overflow = ''; 
                overlay.remove();
            };

            closeBtn.addEventListener('click', closeModal);

            copyBtn.addEventListener('click', () => {
                copyToClipboard(stickerData.content, modal); 
            });

            editBtn.addEventListener('click', () => {
                closeModal(); 
                const stickerElement = document.querySelector(`.sticker-note[data-sticker-id="${currentPage}-${stickerIndex}"]`);
                if (stickerElement) {
                    editSticker(stickerIndex, stickerElement);
                } else {
                    showNotification('Could not find sticker to edit.', 'error');
                }
            });

            deleteBtn.addEventListener('click', () => {
                closeModal(); 
                showDeleteConfirmationModal('Sticker', stickerData.name, () => deleteSticker(stickerIndex)); 
            });
        }

        // --- Data Persistence (localStorage) ---

        function loadAllData() { 
            const storedPages = localStorage.getItem('stickerPages'); 
            if (storedPages) pages = JSON.parse(storedPages); 
            else pages['default'] = []; 
            
            const storedPageOrder = localStorage.getItem('stickerPageOrder');
            if (storedPageOrder) {
                pageOrder = JSON.parse(storedPageOrder);
                const pageKeys = Object.keys(pages);
                pageOrder = pageOrder.filter(pName => pageKeys.includes(pName)); 
                pageKeys.forEach(pKey => { 
                    if (!pageOrder.includes(pKey)) pageOrder.push(pKey);
                });
            } else {
                pageOrder = Object.keys(pages); 
            }

            currentPage = localStorage.getItem('currentPage') || (pageOrder.length > 0 ? pageOrder[0] : 'default'); 
            if (!pages[currentPage]) { 
                currentPage = pageOrder.length > 0 ? pageOrder[0] : 'default'; 
                if (!pages[currentPage] && currentPage === 'default' && !pageOrder.includes('default')) {
                     pages['default'] = []; 
                     if(!pageOrder.includes('default')) pageOrder.push('default');
                }
            } 
            updateUI(); 
        }
        function saveAllData() { 
            localStorage.setItem('stickerPages', JSON.stringify(pages)); 
            localStorage.setItem('stickerPageOrder', JSON.stringify(pageOrder)); 
            localStorage.setItem('currentPage', currentPage); 
        }

        // --- Page Management Functions ---

        function addPage(pageName) { 
            if (pages[pageName]) { 
                showNotification(`Page "${pageName}" already exists!`, 'info'); 
                return; 
            } 
            pages[pageName] = []; 
            if(!pageOrder.includes(pageName)) pageOrder.push(pageName); 
            currentPage = pageName; 
            saveAllData(); 
            updateUI(); 
            showNotification(`Page "${pageName}" created! 🎉`); 
        }
        function switchPage(pageName) { 
            if (currentPage === pageName) return; 
            currentPage = pageName; 
            saveAllData(); 
            updateUI(); 
            showNotification(`Switched to page: "${pageName}"`, 'info'); 
        }
        function editPageName(oldPageName) { 
            showInputModal('Edit Page Name', 'Enter new page name...', oldPageName, 20, 
                (newPageName) => { 
                    if (newPageName === oldPageName) { 
                        showNotification('Page name not changed.', 'info'); 
                        return; 
                    } 
                    if (newPageName.toLowerCase() in pages) { 
                        showNotification(`Page "${newPageName}" already exists!`, 'error'); 
                        return; 
                    } 
                    const pageMessages = pages[oldPageName]; 
                    delete pages[oldPageName]; 
                    pages[newPageName] = pageMessages; 
                    const oldIndex = pageOrder.indexOf(oldPageName); 
                    if(oldIndex > -1) pageOrder.splice(oldIndex, 1, newPageName); 
                    else pageOrder.push(newPageName); 
                    if (currentPage === oldPageName) currentPage = newPageName; 
                    saveAllData(); 
                    updateUI(); 
                    showNotification(`Page "${oldPageName}" renamed to "${newPageName}"!`); 
                }, 
                () => {} 
            ); 
        }
        function deletePage(pageName) { 
            showDeleteConfirmationModal('Page', pageName, () => { 
                delete pages[pageName]; 
                pageOrder = pageOrder.filter(p => p !== pageName); 
                if (pageOrder.length === 0) { 
                    pages['default'] = []; 
                    pageOrder.push('default'); 
                } 
                if (currentPage === pageName) currentPage = pageOrder[0] || 'default'; 
                saveAllData(); 
                updateUI(); 
            }); 
        }
        
        function renderPages() { 
            pagesContainer.innerHTML = ''; 
            pageOrder.forEach(pageName => { 
                if (!pages[pageName]) return; 
                const pageButton = document.createElement('button'); 
                pageButton.className = `action-button px-4 py-2 rounded-xl font-medium text-sm transition-all duration-200 ${currentPage === pageName ? 'primary-button text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`; 
                pageButton.textContent = pageName; 
                pageButton.dataset.pageName = pageName; 
                pageButton.setAttribute('draggable', 'true'); 

                pageButton.addEventListener('click', () => switchPage(pageName)); 
                pageButton.addEventListener('contextmenu', (e) => { e.preventDefault(); showPageContextMenu(e.clientX, e.clientY, pageName); }); 
                
                pageButton.addEventListener('dragstart', handlePageDragStart);
                pageButton.addEventListener('dragover', handlePageDragOver);
                pageButton.addEventListener('dragleave', handlePageDragLeave);
                pageButton.addEventListener('drop', handlePageDrop);
                pageButton.addEventListener('dragend', handlePageDragEnd);

                pagesContainer.appendChild(pageButton); 
            }); 
        }
        function showPageContextMenu(x, y, pageName) { 
            const existingMenu = document.getElementById('pageContextMenu'); 
            if (existingMenu) existingMenu.remove(); 
            const menu = document.createElement('div'); 
            menu.id = 'pageContextMenu'; 
            menu.className = 'absolute bg-white rounded-lg shadow-lg py-2 z-50 text-sm'; 
            menu.style.left = `${x}px`; 
            menu.style.top = `${y}px`; 
            menu.style.minWidth = '120px'; 
            const editItem = document.createElement('button'); 
            editItem.className = 'block w-full text-left px-4 py-2 hover:bg-gray-100'; 
            editItem.textContent = 'Edit Name'; 
            editItem.addEventListener('click', () => { editPageName(pageName); menu.remove(); }); 
            const deleteItem = document.createElement('button'); 
            deleteItem.className = 'block w-full text-left px-4 py-2 text-red-600 hover:bg-red-50'; 
            deleteItem.textContent = 'Delete Page'; 
            deleteItem.addEventListener('click', () => { deletePage(pageName); menu.remove(); }); 
            menu.appendChild(editItem); 
            if (pageOrder.length > 1) menu.appendChild(deleteItem); 
            document.body.appendChild(menu); 
            const closeMenu = (event) => { 
                    menu.remove(); 
                    document.removeEventListener('click', closeMenu); 
                    document.removeEventListener('contextmenu', closeMenu); 
            }; 
            setTimeout(() => { 
                document.addEventListener('click', closeMenu); 
                document.removeEventListener('contextmenu', closeMenu); 
            }, 0); 
        }

        // --- Sticker Drag and Drop Handlers ---
        function handleDragStart(event) {
            // Task 2: Disable drag-and-drop when a filter is active
            if (currentFilter !== 'all') {
                event.preventDefault(); // Prevent the drag operation
                showNotification('Drag and drop is disabled when a filter is active.', 'info');
                return;
            }

            draggedStickerElement = event.target;
            draggedStickerIndex = parseInt(draggedStickerElement.dataset.index);
            draggedStickerElement.classList.add('dragging'); 
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', draggedStickerIndex); 
        }

        function handleDragOver(event) {
            // Task 2: If dragging is disabled, don't show drag over effects
            if (currentFilter !== 'all') {
                return;
            }
            event.preventDefault(); 
            const targetSticker = event.target.closest('.sticker-note');

            if (draggedOverTargetElement && draggedOverTargetElement !== targetSticker) {
                draggedOverTargetElement.classList.remove('drag-target-glow');
                draggedOverTargetElement = null;
            }

            if (targetSticker && targetSticker !== draggedStickerElement) {
                targetSticker.classList.add('drag-target-glow');
                draggedOverTargetElement = targetSticker;
            } else if (!targetSticker && (event.target.id === 'stickerDisplayArea' || event.target.closest('#stickerDisplayArea'))) {
                if (draggedOverTargetElement) {
                    draggedOverTargetElement.classList.remove('drag-target-glow');
                    draggedOverTargetElement = null;
                }
            }
        }
        
        function handleDragLeave(event) {
            // Task 2: If dragging is disabled, don't manage drag leave effects
            if (currentFilter !== 'all') {
                return;
            }
            if (draggedOverTargetElement) {
                draggedOverTargetElement.classList.remove('drag-target-glow');
                draggedOverTargetElement = null;
            }
        }

        function handleDrop(event) {
            event.preventDefault();
            // Task 2: If dragging is disabled, do nothing on drop
            if (currentFilter !== 'all') {
                return;
            }
            
            if (draggedOverTargetElement) {
                draggedOverTargetElement.classList.remove('drag-target-glow');
                draggedOverTargetElement = null;
            }

            if (draggedStickerIndex === null) {
                if(draggedStickerElement) draggedStickerElement.classList.remove('dragging');
                draggedStickerIndex = null;
                draggedStickerElement = null;
                return;
            }

            const stickersInPage = pages[currentPage];
            const stickerToMove = stickersInPage.splice(draggedStickerIndex, 1)[0]; 
            
            const targetSticker = event.target.closest('.sticker-note');
            let newIndex;

            if (targetSticker && targetSticker !== draggedStickerElement) {
                const allStickers = Array.from(stickerDisplayArea.querySelectorAll('.sticker-note'));
                const targetIndex = allStickers.indexOf(targetSticker);
                const rect = targetSticker.getBoundingClientRect();
                const isAfter = event.clientX > rect.left + rect.width / 2;
                
                newIndex = targetIndex;
                if (isAfter) {
                    newIndex = targetIndex + 1;
                }
                
                if (draggedStickerIndex < newIndex) {
                    newIndex--; 
                }

            } else {
                newIndex = stickersInPage.length; 
            }
            
            stickersInPage.splice(newIndex, 0, stickerToMove);
            
            saveAllData();
            updateStickerList(); 
            
            if(draggedStickerElement) draggedStickerElement.classList.remove('dragging');
            draggedStickerIndex = null;
            draggedStickerElement = null;
        }
        
        function handleDragEnd(event) {
            // Task 2: If dragging is disabled, ensure state is clean
            if (currentFilter !== 'all') {
                if(draggedStickerElement) draggedStickerElement.classList.remove('dragging');
                if(draggedOverTargetElement) draggedOverTargetElement.classList.remove('drag-target-glow');
                draggedStickerIndex = null;
                draggedStickerElement = null;
                draggedOverTargetElement = null;
                return;
            }

            if(draggedStickerElement) draggedStickerElement.classList.remove('dragging');
            if(draggedOverTargetElement) draggedOverTargetElement.classList.remove('drag-target-glow');
            draggedStickerIndex = null;
            draggedStickerElement = null;
            draggedOverTargetElement = null;
        }


        // --- Sticker List Management ---

        function updateStickerList() {
            stickerDisplayArea.innerHTML = ''; 
            let currentStickersSource = pages[currentPage] || [];
            let displayedStickers = currentStickersSource;

            // Apply filter based on currentFilter
            if (currentFilter !== 'all') {
                displayedStickers = currentStickersSource.filter(sticker => sticker.importance === currentFilter);
            }

            // Task 2: Determine if stickers should be draggable
            const isDraggable = currentFilter === 'all';

            displayedStickers.forEach((stickerObj, displayIndex) => { // Use displayIndex for elements if needed, but originalIndex for data ops
                // Find original index in the unfiltered list if needed for data operations
                const originalIndex = currentStickersSource.indexOf(stickerObj); 

                const stickerContainer = document.createElement('div');
                stickerContainer.dataset.isEditing = 'false'; 
                // Important: data-index should refer to the original index in pages[currentPage] for edit/delete
                stickerContainer.dataset.index = originalIndex; 
                stickerContainer.dataset.stickerId = `${currentPage}-${originalIndex}`; 
                
                // Task 2: Set draggable attribute and cursor style
                stickerContainer.setAttribute('draggable', isDraggable);
                if (!isDraggable) {
                    stickerContainer.classList.add('cursor-not-allowed');
                } else {
                    stickerContainer.classList.remove('cursor-not-allowed');
                }


                stickerContainer.className = `sticker-note relative p-4 rounded-xl shadow-md ${stickerObj.bgColorClass} ${getImportanceBorderClass(stickerObj.importance)}`;
                
                if (isDraggable) { // Only add drag listeners if draggable
                    stickerContainer.addEventListener('dragstart', handleDragStart);
                    stickerContainer.addEventListener('dragover', handleDragOver); 
                    stickerContainer.addEventListener('dragleave', handleDragLeave); 
                    stickerContainer.addEventListener('drop', handleDrop);      
                    stickerContainer.addEventListener('dragend', handleDragEnd);
                }


                stickerContainer.addEventListener('click', (e) => { 
                    if (!e.target.closest('.sticker-actions button') && stickerContainer.dataset.isEditing === 'false' && !stickerContainer.classList.contains('dragging')) { 
                        showStickerDetailsModal(stickerObj, originalIndex); 
                    } 
                });

                const nameParts = stickerObj.name.split(' - ', 2);
                const baseName = nameParts[0] || stickerObj.name;
                const dateAndWeekPart = nameParts[1] ? `<br>${nameParts[1]}` : '';

                const headerDiv = document.createElement('div'); 
                headerDiv.className = "flex justify-between items-start mb-1"; 
                headerDiv.innerHTML = `<div class="font-semibold text-gray-800 text-sm truncate pr-16 pointer-events-none">${baseName}${dateAndWeekPart}</div>`; 
                stickerContainer.appendChild(headerDiv);

                const contentArea = document.createElement('div'); 
                contentArea.className = "flex-grow overflow-hidden mb-1 pointer-events-none"; 
                const contentText = document.createElement('div'); 
                contentText.className = 'sticker-content-text text-sm text-gray-700 h-full'; 
                const lines = stickerObj.content.split('\n');
                if (lines.length > MAX_STICKER_LINES) { 
                    const lastVisibleLine = lines[MAX_STICKER_LINES -1]; 
                    contentText.textContent = lines.slice(0, MAX_STICKER_LINES-1).join('\n') + '\n' + lastVisibleLine + ' ...'; 
                } else { 
                    contentText.textContent = stickerObj.content.trim(); 
                }
                contentArea.appendChild(contentText); 
                stickerContainer.appendChild(contentArea);
                
                const timestampDiv = document.createElement('div'); 
                timestampDiv.className = 'sticker-timestamp pointer-events-none'; 
                const date = new Date(stickerObj.timestamp); 
                const formattedDate = `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`; 
                const formattedTime = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }); 
                timestampDiv.textContent = `${formattedDate} ${formattedTime}`; 
                stickerContainer.appendChild(timestampDiv);
                
                const importanceDisplayDiv = document.createElement('div');
                importanceDisplayDiv.className = 'importance-display';
                importanceDisplayDiv.innerHTML = `
                    <div class="importance-light ${getImportanceLightClass(stickerObj.importance)}"></div>
                    <span>${getImportanceLabel(stickerObj.importance)}</span>
                `;
                stickerContainer.appendChild(importanceDisplayDiv);

                const actionsDiv = document.createElement('div'); 
                actionsDiv.className = 'sticker-actions'; 
                actionsDiv.innerHTML = `
                    <button class="copy-button action-button text-white px-2 py-1 rounded-lg font-medium text-xs">Copy</button>
                    <button class="edit-button action-button text-white px-2 py-1 rounded-lg font-medium text-xs">Edit</button>
                    <button class="delete-button action-button text-white px-2 py-1 rounded-lg font-medium text-xs">Del</button>
                `; 
                stickerContainer.appendChild(actionsDiv);

                actionsDiv.querySelector('.copy-button').addEventListener('click', (e) => { 
                    e.stopPropagation(); 
                    copyToClipboard(stickerObj.content, stickerContainer); 
                });
                // Pass originalIndex for edit/delete operations
                actionsDiv.querySelector('.edit-button').addEventListener('click', (e) => { e.stopPropagation(); editSticker(originalIndex, stickerContainer); });
                actionsDiv.querySelector('.delete-button').addEventListener('click', (e) => { e.stopPropagation(); showDeleteConfirmationModal('Sticker', stickerObj.name, () => deleteSticker(originalIndex)); });
                
                stickerDisplayArea.appendChild(stickerContainer);
            });
            
            if (isDraggable) { // Only add container drag listeners if draggable
                stickerDisplayArea.addEventListener('dragover', handleDragOver); 
                stickerDisplayArea.addEventListener('dragleave', handleDragLeave); 
                stickerDisplayArea.addEventListener('drop', handleDrop); 
            } else { // Remove if not draggable to prevent interference
                stickerDisplayArea.removeEventListener('dragover', handleDragOver);
                stickerDisplayArea.removeEventListener('dragleave', handleDragLeave);
                stickerDisplayArea.removeEventListener('drop', handleDrop);
            }

            messageCount.textContent = `${displayedStickers.length}/${maxStickers} stickers`; // Count displayed stickers
            updateSaveButtonState();
        }
        
        function editSticker(index, stickerElement) { 
            stickerElement.dataset.isEditing = 'true'; 
            const currentSticker = pages[currentPage][index]; 
            showEditStickerModal(currentSticker, 
                (updatedData) => { 
                    pages[currentPage][index] = { 
                        ...currentSticker, 
                        name: updatedData.name, 
                        content: updatedData.content, 
                        importance: updatedData.importance, 
                        bgColorClass: updatedData.bgColorClass, 
                        timestamp: Date.now(), 
                    }; 
                    saveAllData(); 
                    updateStickerList(); 
                    showNotification('Sticker updated! ✨'); 
                    stickerElement.dataset.isEditing = 'false'; 
                }, 
                () => { 
                    stickerElement.dataset.isEditing = 'false'; 
                }
            ); 
        }
        function deleteSticker(index) { 
            pages[currentPage].splice(index, 1); 
            saveAllData(); 
            updateStickerList(); 
        }
        
        // --- Date and Week Calculation Helpers ---

        function formatDate(date) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0'); 
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function getWeekdayAbbreviation(date) {
            const weekdays = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            return weekdays[date.getDay()];
        }

        function parseDateString(dateString) {
            const parts = dateString.split('/');
            if (parts.length === 3) {
                const day = parseInt(parts[0], 10);
                const month = parseInt(parts[1], 10) - 1; 
                const year = parseInt(parts[2], 10);
                if (year > 0 && month >= 0 && month < 12 && day > 0 && day <= 31) {
                    const date = new Date(year, month, day);
                    if (date.getFullYear() === year && date.getMonth() === month && date.getDate() === day) {
                        return date;
                    }
                }
            }
            return null; 
        }

        function getFinancialYearStartDate(year) {
            let may1 = new Date(year, 4, 1); 
            let dayOfWeek = may1.getDay(); 
            let daysToAdd = (7 - dayOfWeek) % 7; 
            may1.setDate(may1.getDate() + daysToAdd);
            may1.setHours(0, 0, 0, 0); 
            return may1;
        }

        function calculateFinancialWeek(date) {
            const currentCalYear = date.getFullYear();
            const fyStartCurrentCalYear = getFinancialYearStartDate(currentCalYear);
            const fyStartPrevCalYear = getFinancialYearStartDate(currentCalYear - 1);

            let actualFYStart; 
            let actualFYLabel; 
            let nextFYStartForActualFY; 

            if (date < fyStartCurrentCalYear) { 
                actualFYStart = fyStartPrevCalYear;
                actualFYLabel = currentCalYear - 1;
                nextFYStartForActualFY = fyStartCurrentCalYear;
            } else { 
                actualFYStart = fyStartCurrentCalYear;
                actualFYLabel = currentCalYear;
                nextFYStartForActualFY = getFinancialYearStartDate(currentCalYear + 1);
            }

            const daysInActualFY = Math.floor((nextFYStartForActualFY - actualFYStart) / (1000 * 60 * 60 * 24));
            const is53WeekYear = (daysInActualFY === 371); 

            const diffDaysFromActualFYStart = Math.floor((date - actualFYStart) / (1000 * 60 * 60 * 24));
            let weekNumber = Math.floor(diffDaysFromActualFYStart / 7) + 1;

            if (is53WeekYear && weekNumber > 53) {
                weekNumber = 53; 
            } else if (!is53WeekYear && weekNumber > 52) {
                weekNumber = 52; 
            }
            if (weekNumber <=0) weekNumber = 1; 


            const startYearShort = String(actualFYLabel).slice(-2);
            const endYearShort = String(actualFYLabel + 1).slice(-2);
            return `WK${weekNumber} (${startYearShort}-${endYearShort})`;
        }

        function updateDateAndWeekInputs() {
            const today = new Date();
            if (flatpickrInstance) {
                flatpickrInstance.setDate(today, true); 
            } else {
                stickerDateInput.value = formatDate(today);
                updateStickerWeekBasedOnDateInput();
            }
        }

        function updateStickerWeekBasedOnDateInput() {
            const dateString = stickerDateInput.value.trim();
            const parsedDate = parseDateString(dateString);
            if (parsedDate) {
                stickerWeekInput.value = calculateFinancialWeek(parsedDate);
            } else {
                stickerWeekInput.value = ''; 
            }
        }

        // --- Input Handling and Saving ---

        function updateSaveButtonState() { 
            const messageLength = messageInput.value.trim().length; 
            const nameLength = stickerNameInput.value.trim().length; 
            const dateLength = stickerDateInput.value.trim().length; 
            const weekLength = stickerWeekInput.value.trim().length; 
            const currentStickers = pages[currentPage] || []; // Use actual total for the current page
            const totalStickersOnPage = currentStickers.length;
            saveButton.disabled = messageLength === 0 || nameLength === 0 || dateLength === 0 || weekLength === 0 || totalStickersOnPage >= maxStickers || selectedImportance === null; 
        }

        importanceButtonsContainer.addEventListener('click', (e) => {
            const clickedButton = e.target.closest('.importance-button');
            if (clickedButton) {
                importanceButtonsContainer.querySelectorAll('.importance-button').forEach(btn => {
                    btn.classList.remove('selected');
                });
                clickedButton.classList.add('selected');
                selectedImportance = clickedButton.dataset.importance; 
                updateSaveButtonState(); 
            }
        });

        messageInput.addEventListener('input', () => { 
            charCount.textContent = `${messageInput.value.length} characters`; 
            updateSaveButtonState(); 
        });
        stickerNameInput.addEventListener('input', updateSaveButtonState);
        
        stickerDateInput.addEventListener('input', () => {
            updateStickerWeekBasedOnDateInput(); 
            updateSaveButtonState();
        }); 
        stickerWeekInput.addEventListener('input', updateSaveButtonState); 

        saveButton.addEventListener('click', () => { 
            const message = messageInput.value.trim(); 
            const stickerNameBase = stickerNameInput.value.trim(); 
            const stickerDateString = stickerDateInput.value.trim(); 
            const stickerWeekString = stickerWeekInput.value.trim(); 
            const importance = selectedImportance; 
            const currentStickers = pages[currentPage] || []; 

            const parsedDateForWeekday = parseDateString(stickerDateString);
            const weekdayAbbr = parsedDateForWeekday ? getWeekdayAbbreviation(parsedDateForWeekday) : '';

            const fullStickerName = `${stickerNameBase} - ${stickerDateString} ${weekdayAbbr} | ${stickerWeekString}`;

            if (stickerNameBase && stickerDateString && stickerWeekString && message && importance && currentStickers.length < maxStickers) { 
                const stickerObj = { 
                    name: fullStickerName, 
                    content: messageInput.value, 
                    importance, 
                    timestamp: Date.now(), 
                    bgColorClass: getRandomStickerBgClass() 
                }; 
                if (!pages[currentPage]) pages[currentPage] = []; 
                pages[currentPage].unshift(stickerObj); 
                saveAllData(); 
                
                messageInput.value = ''; 
                stickerNameInput.value = ''; 
                charCount.textContent = `0 characters`; 
                selectedImportance = null;
                importanceButtonsContainer.querySelectorAll('.importance-button').forEach(btn => {
                    btn.classList.remove('selected');
                });
                updateDateAndWeekInputs(); 
                updateUI(); 
                showNotification('Sticker saved! ✨'); 
            } else if (currentStickers.length >= maxStickers) { 
                showNotification('Maximum sticker limit reached for this page.', 'error'); 
            } else if (!stickerNameBase) { 
                showNotification('Sticker name cannot be empty.', 'error'); stickerNameInput.focus(); 
            } else if (!stickerDateString) { 
                showNotification('Sticker date cannot be empty.', 'error'); stickerDateInput.focus(); 
            } else if (!stickerWeekString) { 
                showNotification('Sticker week cannot be empty.', 'error'); stickerWeekInput.focus(); 
            } else if (!message) { 
                showNotification('Message content cannot be empty.', 'error'); messageInput.focus(); 
            } else if (!importance) { 
                showNotification('Please select an importance level.', 'error'); 
            } 
        });
        addPageButton.addEventListener('click', () => { 
            const newPageName = newPageNameInput.value.trim(); 
            if (newPageName) { 
                addPage(newPageName); 
                newPageNameInput.value = ''; 
            } else { 
                showNotification('Page name cannot be empty.', 'error'); 
            } 
        });
        newPageNameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addPageButton.click(); });

        // --- Page Drag and Drop Handlers ---
        let pageDropIndicator = null; 
        function handlePageDragStart(event) {
            draggedPageName = event.target.dataset.pageName;
            event.target.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', draggedPageName);
        }
        function handlePageDragOver(event) {
            event.preventDefault();
            const targetPageButton = event.target.closest('#pagesContainer .action-button');

            if (draggedOverPageTargetElement && draggedOverPageTargetElement !== targetPageButton) {
                draggedOverPageTargetElement.classList.remove('drag-target-glow');
                draggedOverPageTargetElement = null;
            }

            if (targetPageButton && targetPageButton.dataset.pageName !== draggedPageName) {
                targetPageButton.classList.add('drag-target-glow');
                draggedOverPageTargetElement = targetPageButton;
            } else if (!targetPageButton && event.currentTarget === pagesContainer) { 
                if (draggedOverPageTargetElement) {
                    draggedOverPageTargetElement.classList.remove('drag-target-glow');
                    draggedOverPageTargetElement = null;
                }
            }
        }
        function handlePageDragLeave(event) {
            if (draggedOverPageTargetElement) {
                draggedOverPageTargetElement.classList.remove('drag-target-glow');
                draggedOverPageTargetElement = null;
            }
        }
        function handlePageDrop(event) {
            event.preventDefault();
            
            if (draggedOverPageTargetElement) {
                draggedOverPageTargetElement.classList.remove('drag-target-glow');
                draggedOverPageTargetElement = null;
            }

            if (!draggedPageName) { 
                const draggingElem = pagesContainer.querySelector(`.action-button[data-page-name="${draggedPageName}"]`);
                if(draggingElem) draggingElem.classList.remove('dragging');
                draggedPageName = null;
                return;
            }

            const oldIndex = pageOrder.indexOf(draggedPageName);
            pageOrder.splice(oldIndex, 1); 

            const allPageButtons = Array.from(pagesContainer.querySelectorAll('.action-button'));
            let newIndex = allPageButtons.length; 
            const targetPageButton = event.target.closest('.action-button');

            if (targetPageButton && targetPageButton.dataset.pageName !== draggedPageName) {
                const targetIndex = allPageButtons.indexOf(targetPageButton);
                const rect = targetPageButton.getBoundingClientRect();
                const isAfter = event.clientX > rect.left + rect.width / 2;
                newIndex = targetIndex;
                if (isAfter) {
                    newIndex = targetIndex + 1;
                }
                if (oldIndex < newIndex) {
                    newIndex--; 
                }
            }
            
            pageOrder.splice(newIndex, 0, draggedPageName); 

            saveAllData();
            renderPages(); 

            const finalDraggingElem = pagesContainer.querySelector(`.action-button[data-page-name="${draggedPageName}"]`);
            if(finalDraggingElem) finalDraggingElem.classList.remove('dragging');
            draggedPageName = null;
        }
        function handlePageDragEnd(event) {
            const elem = event.target.closest('.action-button');
            if(elem) elem.classList.remove('dragging');
            if(draggedOverPageTargetElement) draggedOverPageTargetElement.classList.remove('drag-target-glow');
            draggedPageName = null;
            draggedOverPageTargetElement = null;
        }

        // --- Global Search Functions ---
        function performGlobalSearch() { 
            const allStickers = [];
            pageOrder.forEach(pageName => {
                if (pages[pageName]) {
                    pages[pageName].forEach((sticker, index) => {
                        allStickers.push({ ...sticker, pageName, originalIndex: index, stickerId: `${pageName}-${index}` });
                    });
                }
            });
            displaySearchResultsModal(allStickers, ''); 
        }
        function displaySearchResultsModal(allStickers, initialSearchTerm) {
            const existingModal = document.getElementById('searchResultsModal'); 
            if(existingModal) existingModal.remove(); 
            
            const overlay = document.createElement('div'); 
            overlay.id = 'searchResultsModal'; 
            overlay.className = 'modal-overlay fixed inset-0 flex items-center justify-center z-[100]';
            const modal = document.createElement('div'); 
            modal.className = 'modal-content search-results-modal-content fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 rounded-3xl p-6 sm:p-8 shadow-2xl';
            
            modal.innerHTML = `
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-2xl font-semibold text-gray-800">Search Stickers</h3>
                        <button id="closeSearchModalButton" class="text-gray-500 hover:text-gray-700">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
                        </button>
                    </div>
                    <div class="mb-4">
                        <input type="text" id="modalSearchInput" class="input-field w-full p-3 rounded-xl focus:outline-none text-sm" placeholder="Search all stickers..." value="${initialSearchTerm}">
                    </div>
                    <div class="search-modal-body scrollbar-custom pr-2">
                        </div>
                </div>
            `;
            overlay.appendChild(modal); 
            document.body.appendChild(overlay); 
            document.body.style.overflow = 'hidden'; 

            const modalSearchInput = modal.querySelector('#modalSearchInput');
            const searchResultsContainer = modal.querySelector('.search-modal-body');

            const renderFilteredResults = (searchTerm) => {
                const lowerCaseSearchTerm = searchTerm.trim().toLowerCase();
                const keywords = lowerCaseSearchTerm.split(/\s+/).filter(word => word.length > 0); 

                const filteredResults = allStickers.filter(sticker => {
                    const importanceLabel = getImportanceLabel(sticker.importance).toLowerCase();
                    const searchableText = `${sticker.name.toLowerCase()} ${sticker.content.toLowerCase()} ${importanceLabel}`;
                    
                    return keywords.every(keyword => searchableText.includes(keyword));
                });

                let resultsHTML = '';
                if (filteredResults.length > 0) {
                    filteredResults.forEach(sticker => {
                        const date = new Date(sticker.timestamp); 
                        const formattedDate = `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`; 
                        const formattedTime = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }); 
                        const displayTimestamp = `${formattedDate} ${formattedTime}`;
                        
                        let displayName = sticker.name;
                        let displayContent = sticker.content;
                        let displayImportanceLabel = getImportanceLabel(sticker.importance);

                        keywords.forEach(keyword => {
                            const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                            displayName = displayName.replace(regex, '<mark class="bg-yellow-200 rounded">$1</mark>');
                            displayContent = displayContent.replace(regex, '<mark class="bg-yellow-200 rounded">$1</mark>');
                            displayImportanceLabel = displayImportanceLabel.replace(regex, '<mark class="bg-yellow-200 rounded">$1</mark>');
                        });
                        
                        resultsHTML += `
                            <div class="search-result-item ${getImportanceBorderClass(sticker.importance)} border-l-4 pl-3" data-target-page="${sticker.pageName}" data-sticker-id="${sticker.stickerId}">
                                <h4 class="font-semibold text-lg text-gray-800 mb-1">${displayName}</h4>
                                <p class="text-xs text-gray-500 mb-1">On page: ${sticker.pageName}</p>
                                <div class="flex items-center gap-1 text-sm text-gray-700 mb-2">
                                    <div class="importance-light ${getImportanceLightClass(sticker.importance)}"></div>
                                    <span>${displayImportanceLabel}</span>
                                </div>
                                <div class="search-result-content text-sm text-gray-700 mb-2 whitespace-pre-wrap scrollbar-custom">${displayContent}</div>
                                <p class="text-xs text-gray-500 text-right">${displayTimestamp}</p>
                            </div>`;
                    });
                } else { 
                    resultsHTML = '<p class="text-gray-600 text-center py-4">No stickers found matching your search.</p>'; 
                }
                searchResultsContainer.innerHTML = resultsHTML;

                searchResultsContainer.querySelectorAll('.search-result-content').forEach(contentDiv => {
                    const firstHighlight = contentDiv.querySelector('mark');
                    if (firstHighlight) {
                        firstHighlight.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                });


                searchResultsContainer.querySelectorAll('.search-result-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const targetPage = item.dataset.targetPage;
                        const targetStickerId = item.dataset.stickerId;
                        switchPage(targetPage); 
                        setTimeout(() => { 
                            const stickerElement = document.querySelector(`.sticker-note[data-sticker-id="${targetStickerId}"]`);
                            if (stickerElement) {
                                stickerElement.classList.add('sticker-shake-effect');
                                setTimeout(() => {
                                    stickerElement.classList.remove('sticker-shake-effect');
                                    stickerElement.classList.add('sticker-highlight-effect');
                                    const firstHighlightInSticker = stickerElement.querySelector('mark');
                                    if (firstHighlightInSticker) {
                                        firstHighlightInSticker.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    } else {
                                        stickerElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    }
                                    setTimeout(() => { 
                                        stickerElement.classList.remove('sticker-highlight-effect');
                                    }, 5000); 
                                }, 500); 
                            }
                        }, 100); 
                        document.body.style.overflow = ''; 
                        overlay.remove(); 
                    });
                });
            };

            renderFilteredResults(initialSearchTerm);

            modalSearchInput.addEventListener('input', (e) => {
                renderFilteredResults(e.target.value);
            });
            modalSearchInput.focus(); 

            modal.querySelector('#closeSearchModalButton').addEventListener('click', () => { 
                document.body.style.overflow = ''; 
                overlay.remove(); 
            });
        }
        
        // Task 1: Modified globalSearchButton event listener
        globalSearchButton.addEventListener('click', () => {
            // Reset filters to "All"
            currentFilter = 'all';
            importanceFilterContainer.querySelectorAll('.filter-importance-button').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.filter === 'all');
            });

            // Update sticker list (this will also re-enable draggable if it was disabled)
            updateStickerList(); 

            // Hide the filter active message as filter is now "all"
            if (filterNotificationArea) {
                filterNotificationArea.classList.add('hidden');
            }

            performGlobalSearch(); // Original action: open search modal
        });


        // --- Export to Excel Functionality ---
        function exportToExcel() {
            const currentStickers = pages[currentPage] || [];
            if (currentStickers.length === 0) {
                showNotification('No stickers on this page to export.', 'info');
                return;
            }

            const headers = ["Name", "Content", "Importance", "Timestamp"];
            let csvContent = headers.map(header => `"${header.replace(/"/g, '""')}"`).join(',') + '\n';

            currentStickers.forEach(sticker => {
                const name = `"${sticker.name.replace(/"/g, '""')}"`;
                const content = `"${sticker.content.replace(/"/g, '""')}"`; 
                const importance = `"${getImportanceLabel(sticker.importance).replace(/"/g, '""')}"`;
                const date = new Date(sticker.timestamp);
                const formattedTimestamp = `"${date.toLocaleString().replace(/"/g, '""')}"`; 

                csvContent += [name, content, importance, formattedTimestamp].join(',') + '\n';
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            link.setAttribute('href', url);
            link.setAttribute('download', `${currentPage}_stickers.csv`);
            link.style.visibility = 'hidden'; 
            document.body.appendChild(link); 
            link.click(); 
            document.body.removeChild(link); 
            URL.revokeObjectURL(url); 

            showNotification(`Exported ${currentStickers.length} stickers from "${currentPage}"!`);
        }
        exportButton.addEventListener('click', exportToExcel);

        // --- UI Update and Initialization ---

        function updateUI() { 
            if (!pages[currentPage] && pageOrder.length > 0) { 
                currentPage = pageOrder[0]; 
            } else if (!pages[currentPage]) { 
                currentPage = 'default'; 
                if(!pageOrder.includes('default')) pageOrder.push('default'); 
                if(!pages.default) pages.default = []; 
            } 
            saveAllData(); 
            renderPages(); 
            updateStickerList(); 
            const pageTitle = currentPage.charAt(0).toUpperCase() + currentPage.slice(1); 
            currentStickerPageTitle.textContent = `${pageTitle} Stickers`; 
            updateSaveButtonState(); 
            
            selectedImportance = null;
            importanceButtonsContainer.querySelectorAll('.importance-button').forEach(btn => {
                btn.classList.remove('selected');
            });

            importanceFilterContainer.querySelectorAll('.filter-importance-button').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.filter === currentFilter);
            });

            // Task 2: Manage filter active message
            if (filterNotificationArea) {
                if (currentFilter !== 'all') {
                    filterNotificationArea.textContent = 'Drag-and-drop reordering is disabled while a filter is active.';
                    filterNotificationArea.classList.remove('hidden');
                } else {
                    filterNotificationArea.classList.add('hidden');
                }
            }
        }
        
        // Event listener for filter buttons:
        importanceFilterContainer.addEventListener('click', (e) => {
            const clickedButton = e.target.closest('.filter-importance-button');
            if (clickedButton) {
                importanceFilterContainer.querySelectorAll('.filter-importance-button').forEach(btn => {
                    btn.classList.remove('selected');
                });
                clickedButton.classList.add('selected');
                currentFilter = clickedButton.dataset.filter;
                updateStickerList(); // Re-render sticker list with new filter and draggable state

                // Task 2: Update filter active message
                if (filterNotificationArea) {
                    if (currentFilter !== 'all') {
                        filterNotificationArea.textContent = 'Drag-and-drop reordering is disabled while a filter is active.';
                        filterNotificationArea.classList.remove('hidden');
                    } else {
                        filterNotificationArea.classList.add('hidden');
                    }
                }
            }
        });

        // Initialize Flatpickr
        flatpickrInstance = flatpickr(stickerDateInput, {
            dateFormat: "d/m/Y",      
            altInput: true,          
            altFormat: "d/m/Y",      
            allowInput: true,        
            clickOpens: false,       
            defaultDate: "today",
            onChange: function(selectedDates, dateStr, instance) {
                const event = new Event('input', { bubbles: true });
                instance.input.dispatchEvent(event);
            }
        });

        if (flatpickrInstance && flatpickrInstance.altInput) {
            flatpickrInstance.altInput.addEventListener('change', () => {
                const event = new Event('input', { bubbles: true });
                stickerDateInput.dispatchEvent(event); 
            });
        }

        stickerDateIcon.addEventListener('click', () => {
            if (flatpickrInstance) {
                flatpickrInstance.open();
            }
        });
        
        loadAllData(); 
        updateDateAndWeekInputs(); 
    </script>
</body>
</html>
